<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Blue block -->
  <rect x="0" y="0" width="200" height="80" fill="#1A206D" rx="4"/>
  <!-- White text: Housing -->
  <text x="100" y="34" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">HOUSING</text>
  <!-- White divider line -->
  <line x1="14" y1="42" x2="186" y2="42" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Grey text: Executive -->
  <text x="100" y="62" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#C8C9CA" text-anchor="middle" letter-spacing="2">EXECUTIVE</text>
</svg>
